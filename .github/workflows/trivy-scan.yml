name: trivy-scan

# Scans for HIGH/CRITICAL CVEs that have a fix available:
#   - all images referenced in our compose files (container scan)
#   - deploy-gate Go source + go.sum dependencies (fs scan)
# Replaces the legacy trivy-scanner.service on the metrics host.
# Triggers: weekly cron baseline, PRs touching compose files or
# deploy-gate sources (so a Dependabot bump shows its CVE delta),
# and manual dispatch.

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'infra/**/docker-compose*.yml'
      - 'deploy-gate/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-images:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.extract.outputs.images }}
    steps:
      - uses: actions/checkout@v6

      - id: extract
        name: Extract images from compose files
        run: |
          images=$(grep -hE '^[[:space:]]+image:[[:space:]]*' infra/*/docker-compose*.yml \
            | sed -E 's/^[[:space:]]+image:[[:space:]]*//; s/^"//; s/"$//; s/[[:space:]]+$//' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "images=$images"
          echo "images=$images" >> "$GITHUB_OUTPUT"

  scan:
    needs: collect-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.collect-images.outputs.images) }}
    steps:
      - name: Trivy scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          output: trivy-output.txt

      - name: Append result to job summary
        if: always()
        run: |
          {
            echo "### \`${{ matrix.image }}\`"
            echo ''
            echo '```'
            cat trivy-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  scan-deploy-gate:
    # Go source scan — trivy reads go.mod/go.sum and flags CVEs in our
    # transitive deps. Not container-based; deploy-gate ships as a native
    # systemd binary, not an image.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy fs scan deploy-gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: deploy-gate
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          output: trivy-deploy-gate.txt

      - name: Append result to job summary
        if: always()
        run: |
          {
            echo '### `deploy-gate` (Go source)'
            echo ''
            echo '```'
            cat trivy-deploy-gate.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
