[defaults]
inventory             = inventory/hosts.ini
roles_path            = roles
# accept-new (in ssh_args below) trusts a new host key on first connect, then
# requires match — MITM protection that doesn't block first bootstrap.
# If you re-image a VDS, drop the stale key locally: ssh-keygen -R <ip>
host_key_checking     = True
retry_files_enabled   = False
stdout_callback       = default
result_format         = yaml
interpreter_python    = /usr/bin/python3
# Silence deprecation warnings coming from Ansible/collection internals —
# not our code, not actionable. Drop once we move to Ansible 2.24+.
deprecation_warnings  = False
# Single vault password for vault.yml and all ansible/envs/.env.api.*.
# Path is relative to ansible.cfg → ../.vault_pass = repo_root/.vault_pass.
# .vault_pass is gitignored, mode 0600. Missing → vault commands fail;
# use --ask-vault-pass for a one-off override.
vault_password_file   = ../.vault_pass

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
